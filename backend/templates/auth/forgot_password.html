{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-sm-10">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h5 class="mb-0"><i class="fas fa-unlock-alt me-2"></i>Forgot Password</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">
                    Enter your <strong>username</strong>. An OTP will be sent to your registered email.
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" name="username" required
                                placeholder="Enter your username" autofocus>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">
                        <i class="fas fa-paper-plane me-2"></i>Send OTP
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-muted small">
                        <i class="fas fa-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
        <p class="text-center text-muted small mt-3">
            <i class="fas fa-info-circle me-1"></i>
            If your account has no email set, contact your admin.
        </p>
    </div>
</div>
{% endblock %}
