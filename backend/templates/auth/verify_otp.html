{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-sm-10">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark text-center py-3">
                <h5 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Verify OTP</h5>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info py-2 text-center mb-4">
                    <i class="fas fa-envelope me-2"></i>
                    OTP sent to the email registered for <strong>{{ username }}</strong>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Enter OTP</label>
                        <input type="text" class="form-control form-control-lg text-center fw-bold" name="otp" required
                            maxlength="6" placeholder="_ _ _ _ _ _" style="letter-spacing: 0.5rem; font-size: 1.5rem;"
                            autofocus>
                        <div class="form-text">OTP is valid for 10 minutes.</div>
                    </div>

                    <hr class="my-3">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        <input type="password" class="form-control" name="new_password" required minlength="6"
                            placeholder="Min 6 characters">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control" name="confirm_password" required minlength="6"
                            placeholder="Re-enter new password">
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">
                        <i class="fas fa-check me-2"></i>Verify OTP & Set New Password
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none text-muted small">
                        <i class="fas fa-redo me-1"></i> Request new OTP
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
