{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h2>Edit Prescription</h2>
    <a href="{{ url_for('prescription.history', customer_id=customer.id) }}" class="btn btn-sm btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to History
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">Editing Prescription for {{ customer.name }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">

                    <h5 class="border-bottom pb-2">Right Eye (OD)</h5>
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="form-label">SPH</label>
                            <input type="number" step="0.25" class="form-control" name="re_sph"
                                value="{{ prescription.re_sph or '' }}" placeholder="e.g. -1.25">
                        </div>
                        <div class="col-4">
                            <label class="form-label">CYL</label>
                            <input type="number" step="0.25" class="form-control" name="re_cyl"
                                value="{{ prescription.re_cyl or '' }}" placeholder="e.g. -0.50">
                        </div>
                        <div class="col-4">
                            <label class="form-label">AXIS</label>
                            <input type="number" step="1" min="0" max="180" class="form-control" name="re_axis"
                                value="{{ prescription.re_axis or '' }}" placeholder="0-180">
                        </div>
                    </div>

                    <h5 class="border-bottom pb-2 mt-3">Left Eye (OS)</h5>
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="form-label">SPH</label>
                            <input type="number" step="0.25" class="form-control" name="le_sph"
                                value="{{ prescription.le_sph or '' }}" placeholder="e.g. -1.25">
                        </div>
                        <div class="col-4">
                            <label class="form-label">CYL</label>
                            <input type="number" step="0.25" class="form-control" name="le_cyl"
                                value="{{ prescription.le_cyl or '' }}" placeholder="e.g. -0.50">
                        </div>
                        <div class="col-4">
                            <label class="form-label">AXIS</label>
                            <input type="number" step="1" min="0" max="180" class="form-control" name="le_axis"
                                value="{{ prescription.le_axis or '' }}" placeholder="0-180">
                        </div>
                    </div>

                    <h5 class="border-bottom pb-2 mt-3">Addition (Near Vision)</h5>
                    <div class="row mb-3">
                        <div class="col-md-4 col-6">
                            <label class="form-label">ADD</label>
                            <input type="number" step="0.25" min="0" class="form-control" name="addition"
                                value="{{ prescription.addition or '' }}" placeholder="e.g. +1.00">
                        </div>
                    </div>

                    <div class="mb-3 mt-2">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" name="notes" rows="3">{{ prescription.notes or '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('prescription.history', customer_id=customer.id) }}"
                            class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning text-dark fw-bold">Update Prescription</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
